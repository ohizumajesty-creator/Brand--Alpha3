<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brand.com</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body id="login">
    <header>
        <div>
            <a href="index.html">Brand.com</a>
            <nav aria-label="Main navigation">
                <a href="index.html">Home</a>
                <a href="Categories.html">Categories</a>
                <a href="Shopping Cart.html">Cart</a>
                <a href="Login.html" aria-current="page">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="auth">
            <div>
                <header>
                    <p data-eyebrow>Member access</p>
                    <h1>Sign in to your account</h1>
                    <p>Access your cart, orders, and personalized recommendations.</p>
                </header>
                <form>
                    <label for="email">Email address</label>
                    <input id="email" type="email" placeholder="name@example.com" required>

                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required>

                    <button type="submit" data-tone="primary">Sign in</button>
                    <p>New here? <a href="Categories.html">Browse collections</a></p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div>
            <p>© 2026 Brand.com. Crafted for a modern shopping experience.</p>
            <nav aria-label="Footer navigation">
                <a href="index.html">Home</a>
                <a href="Categories.html">Categories</a>
                <a href="Shopping Cart.html">Cart</a>
            </nav>
        </div>
    </footer>
</body>
</html>
