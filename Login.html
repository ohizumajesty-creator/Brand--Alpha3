<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brand.com</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="brand">
                <span>Brand.com</span>
            </a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="Categories.html">Categories</a>
                <a href="Shopping Cart.html">Cart</a>
                <a href="Login.html" class="active">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section auth-section">
            <div class="container auth-card">
                <div class="auth-info">
                    <span class="eyebrow">Member access</span>
                    <h1>Sign in to your account</h1>
                    <p>Access your cart, orders, and personalized recommendations.</p>
                </div>
                <form class="auth-form">
                    <label for="email">Email address</label>
                    <input id="email" type="email" placeholder="name@example.com" required>

                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required>
                    <a href="#" class="forgot-password">Forgot password?</a>

                    <button type="submit" class="button button-primary">Sign in</button>
                    
                    <div class="divider-or">
                        <span>or</span>
                    </div>
                    
                    <div class="social-signin">
                        <button type="button" class="button button-facebook">Facebook</button>
                        <button type="button" class="button button-twitter">Twitter</button>
                    </div>

                    <p class="auth-note">New here? <a href="Categories.html">Browse collections</a></p>
                </form>
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 Brand.com. Crafted for a modern shopping experience.</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="Categories.html">Categories</a>
                <a href="Shopping Cart.html">Cart</a>
            </div>
        </div>
    </footer>
</body>
</html>
